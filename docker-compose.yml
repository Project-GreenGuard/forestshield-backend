services:
  api:
    build: .
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-http://dynamodb:8000}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-WildfireSensorData}
      - NASA_MAP_KEY=${NASA_MAP_KEY:-}
      - CLOUD_RUN_PREDICT_URL=${CLOUD_RUN_PREDICT_URL:-}
      - CLOUD_RUN_TIMEOUT_SEC=${CLOUD_RUN_TIMEOUT_SEC:-8}
    volumes:
      - ./api-gateway-lambda:/app
      - ./lambda-processing:/app/lambda-processing
    depends_on:
      - dynamodb
    networks:
      - wildfire-network

  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    networks:
      - wildfire-network

  mqtt:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - wildfire-network

volumes:
  dynamodb-data:

networks:
  wildfire-network:
    driver: bridge
